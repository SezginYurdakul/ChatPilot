services:
  app:
    build:
      context: .
      dockerfile: ${PHP_DOCKERFILE:-docker/php/Dockerfile}
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - chatpilot

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/${NGINX_CONF:-default.conf}:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html
    depends_on:
      - app
      - reverb
    networks:
      - chatpilot

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-chatpilot}
      POSTGRES_USER: ${DB_USERNAME:-chatpilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatpilot

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - chatpilot

  reverb:
    build:
      context: .
      dockerfile: ${PHP_DOCKERFILE:-docker/php/Dockerfile}
    command: php artisan reverb:start --host=0.0.0.0 --port=9090
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - redis
    networks:
      - chatpilot

  queue:
    build:
      context: .
      dockerfile: ${PHP_DOCKERFILE:-docker/php/Dockerfile}
    command: php artisan queue:work redis --sleep=3 --tries=3
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
      - redis
    networks:
      - chatpilot

volumes:
  postgres_data:
  redis_data:

networks:
  chatpilot:
    driver: bridge
