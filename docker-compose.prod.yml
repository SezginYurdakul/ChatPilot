services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: chatpilot_app
    restart: unless-stopped
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - chatpilot-prod

  nginx:
    image: nginx:alpine
    container_name: chatpilot_nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - app
      - reverb
    networks:
      - chatpilot-prod

  postgres:
    image: postgres:16-alpine
    container_name: chatpilot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-chatpilot}
      POSTGRES_USER: ${DB_USERNAME:-chatpilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - chatpilot_postgres:/var/lib/postgresql/data
    networks:
      - chatpilot-prod

  redis:
    image: redis:7-alpine
    container_name: chatpilot_redis
    restart: unless-stopped
    volumes:
      - chatpilot_redis:/data
    networks:
      - chatpilot-prod

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: chatpilot_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=9090
    env_file: .env
    depends_on:
      - redis
    networks:
      - chatpilot-prod

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: chatpilot_queue
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - chatpilot-prod

volumes:
  chatpilot_postgres:
  chatpilot_redis:

networks:
  chatpilot-prod:
    driver: bridge
