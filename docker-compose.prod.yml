services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: unless-stopped
    environment:
      LOG_CHANNEL: stderr
      LOG_STACK: stderr
    volumes:
      - public_assets:/var/www/html/public

  nginx:
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8090}:80"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - public_assets:/var/www/html/public:ro

  postgres:
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    restart: unless-stopped
    ports: []

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: unless-stopped
    environment:
      LOG_CHANNEL: stderr
      LOG_STACK: stderr
    volumes: []

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    restart: unless-stopped
    environment:
      LOG_CHANNEL: stderr
      LOG_STACK: stderr
    volumes: []

volumes:
  postgres_data:
    external: true
    name: ${POSTGRES_VOLUME_NAME:-chatpilot_postgres_data}
  redis_data:
  public_assets:
