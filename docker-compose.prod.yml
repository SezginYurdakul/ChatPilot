services:
  app:
    restart: unless-stopped
    environment:
      LOG_CHANNEL: stderr
      LOG_STACK: stderr
    volumes:
      - public_assets:/var/www/html/public

  nginx:
    restart: unless-stopped
    volumes:
      - public_assets:/var/www/html/public:ro

  postgres:
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    restart: unless-stopped

  reverb:
    restart: unless-stopped
    environment:
      LOG_CHANNEL: stderr
      LOG_STACK: stderr

  queue:
    restart: unless-stopped
    environment:
      LOG_CHANNEL: stderr
      LOG_STACK: stderr

volumes:
  postgres_data:
    external: true
    name: ${POSTGRES_VOLUME_NAME:-chatpilot_postgres_data}
  redis_data:
  public_assets:
